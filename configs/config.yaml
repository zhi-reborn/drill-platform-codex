# Drill Platform 配置文件

# 应用角色与实例标识（多节点部署时通过环境变量覆盖）
app_role: all            # api, worker, all
instance_id: node-1      # worker/all 角色必须非空

server:
  port: 8080
  mode: debug  # debug, release, test

database:
  driver: mysql
  host: mysql
  port: 3306
  user: drill_user
  password: drill_password123
  name: drill_platform
  maxIdleConns: 10
  maxOpenConns: 100

redis:
  addr: redis:6379       # 优先使用 addr；host/port 保留向后兼容
  host: redis
  port: 6379
  password: ""
  db: 0
  poolSize: 10

jwt:
  secret: "your-secret-key-change-in-production"
  expire: 24  # hours

# 公共访问基础 URL（用于 CAS 回调等）
public_base_url: "http://127.0.0.1:8080"

auth:
  mode: cas_ldap  # local, cas_ldap
  autoCreateUser: true
  defaultRole: viewer
  roleMappings:
    admin: "drill-admin"
    director: "drill-director"
    executor: "drill-executor"
    viewer: "drill-viewer"

cas:
  enabled: true
  serverURL: "http://host.docker.internal:9091/cas"
  publicURL: "http://127.0.0.1:9091/cas"
  serviceURL: "http://127.0.0.1:5173/api/v1/auth/cas/callback"

ldap:
  enabled: true
  url: "http://host.docker.internal:9091/ldap"
  bindDN: "cn=readonly,dc=example,dc=com"
  bindPassword: "change-me"
  baseDN: "ou=users,dc=example,dc=com"
  userFilter: "(uid=%s)"
  usernameAttribute: "uid"
  realNameAttribute: "cn"
  emailAttribute: "mail"
  phoneAttribute: "mobile"
  departmentAttribute: "department"
  groupBaseDN: "ou=groups,dc=example,dc=com"
  groupFilter: "(memberUid=%s)"
  groupNameAttribute: "cn"
  timeoutSeconds: 60

# Worker 领导选举与命令处理参数
worker:
  lease_ttl: 15s
  renew_interval: 5s

# 流程命令等待超时
command_wait_timeout: 30s

# 登录日志文件路径；为空时仅输出到 stdout
login_log_file: "logs/login.log"

oss:
  provider: local  # local, aliyun, qiniu
  endpoint: ""
  bucket: ""
  accessKey: ""
  secretKey: ""

cors:
  allowOrigins:
    - "http://localhost:3000"
  allowMethods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowHeaders:
    - "Content-Type"
    - "Authorization"

# 兼容旧字段（login_log_file 的别名，优先使用顶层 login_log_file）
log:
  loginLogFile: "logs/login.log"  # 登录日志文件路径
