# Drill Platform 配置文件

server:
  port: 8080
  mode: debug  # debug, release, test
  
database:
  driver: mysql
  host: localhost
  port: 3306
  user: root
  password: ""
  database: drill_platform
  maxIdleConns: 10
  maxOpenConns: 100

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  poolSize: 10

jwt:
  secret: "your-secret-key-change-in-production"
  expire: 24  # hours

oss:
  provider: local  # local, aliyun, qiniu
  endpoint: ""
  bucket: ""
  accessKey: ""
  secretKey: ""

cors:
  allowOrigins:
    - "http://localhost:3000"
  allowMethods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowHeaders:
    - "Content-Type"
    - "Authorization"
