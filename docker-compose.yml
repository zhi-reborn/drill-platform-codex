services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: drill-platform-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-drill_platform}
      MYSQL_USER: ${MYSQL_USER:-drill_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-drill_password123}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    networks:
      - drill-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: drill-platform-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - drill-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 Go 服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drill-platform-backend
    restart: always
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_PORT=${APP_PORT:-8080}
      - WS_PORT=${WS_PORT:-8081}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE:-drill_platform}
      - MYSQL_USER=${MYSQL_USER:-drill_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-drill_password123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - JWT_EXPIRE=${JWT_EXPIRE:-24h}
    ports:
      - "${API_PORT:-8080}:8080"
      - "${WS_PORT:-8081}:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - drill-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端 Vue3 服务
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: drill-platform-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - drill-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: drill-platform-nginx
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
      - ./web/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - drill-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  drill-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
